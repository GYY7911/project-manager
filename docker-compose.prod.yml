services:
  postgres:
    image: postgres:16-alpine
    container_name: pm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: project_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: pm-server:latest
    container_name: pm-server
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@postgres:5432/project_manager?schema=public"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      REDIS_URL: "redis://redis:6379"
      PORT: "4001"
      CORS_ORIGINS: "http://localhost:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: pm-web:latest
    container_name: pm-web
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4001/api"
      PORT: "4000"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
